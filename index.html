<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Martin的動態圖文生成藝術</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tweakpane@3.1.9/dist/tweakpane.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
        }
    </style>
</head>
<body>

    <script>
        let customImage = null;

        const PARAMS = {
            columns: 12,
            rows: 8,
            baseScale: 1.0,
            shape: 'text',

            dynamicMode: 'wave', // 預設模式
            speed: 0.05,
            waveFrequency: 0.15,
            rotationAmp: 180,

            color: '#ffffff',
            bgColor: '#141414',
            isWireframe: false,

            textContent: 'M'
        };

        const pane = new Tweakpane.Pane({ title: 'VJ 視覺控制台' });

        // --- 資料夾 1：網格與形狀 ---
        const f1 = pane.addFolder({ title: '網格與形狀' });
        f1.addInput(PARAMS, 'columns', { min: 1, max: 50, step: 1, label: '直行數量' });
        f1.addInput(PARAMS, 'rows', { min: 1, max: 50, step: 1, label: '橫列數量' });
        f1.addInput(PARAMS, 'baseScale', { min: 0.01, max: 3.0, label: '基礎大小' });
        f1.addInput(PARAMS, 'shape', {
            options: { 方塊: 'rect', 圓形: 'circle', 線條: 'line', 文字: 'text', 自訂圖片: 'image' },
            label: '圖形種類'
        });

        // --- 資料夾 2：自訂素材匯入 ---
        const f2 = pane.addFolder({ title: '自訂素材匯入' });
        f2.addInput(PARAMS, 'textContent', { label: '輸入文字' });

        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = 'image/*';
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                loadImage(url, (img) => {
                    customImage = img;
                    PARAMS.shape = 'image';
                    pane.refresh();
                });
            }
        };
        f2.addButton({ title: '📁 上傳本機圖片' }).on('click', () => {
            fileInput.click();
        });

        // --- 資料夾 3：波動力學 ---
        const f3 = pane.addFolder({ title: '波動力學' });
        // 【修改】升級全新的動態模式
        f3.addInput(PARAMS, 'dynamicMode', {
            options: { 綜合波動: 'wave', 位置浮動: 'orbit', 滑動交錯: 'slide', 隨機抖動: 'jitter' },
            label: '動態模式'
        });
        f3.addInput(PARAMS, 'speed', { min: 0, max: 0.2, label: '流動速度' });
        // 【修改】波浪密度最小值改為 0.00
        f3.addInput(PARAMS, 'waveFrequency', { min: 0.00, max: 0.5, label: '波浪密度' });
        f3.addInput(PARAMS, 'rotationAmp', { min: 0, max: 360, label: '旋轉幅度' });

        // --- 資料夾 4：色彩與風格 ---
        const f4 = pane.addFolder({ title: '色彩與風格' });
        f4.addInput(PARAMS, 'color', { label: '主色調' });
        f4.addInput(PARAMS, 'bgColor', { label: '背景色' });
        f4.addInput(PARAMS, 'isWireframe', { label: '線框模式' });

        function setup() {
            createCanvas(windowWidth, windowHeight);
            rectMode(CENTER);
            imageMode(CENTER);
            textAlign(CENTER, CENTER);
            textStyle(BOLD);
        }

        function draw() {
            // 隨機抖動模式搭配微透明背景，可以製造出殘影效果
            if (PARAMS.dynamicMode === 'jitter') {
                background(color(PARAMS.bgColor).levels[0], color(PARAMS.bgColor).levels[1], color(PARAMS.bgColor).levels[2], 50);
            } else {
                background(PARAMS.bgColor);
            }

            if (PARAMS.isWireframe) {
                noFill();
                stroke(PARAMS.color);
                strokeWeight(2);
            } else {
                fill(PARAMS.color);
                noStroke();
            }

            let cellW = width / PARAMS.columns;
            let cellH = height / PARAMS.rows;

            for (let i = 0; i < PARAMS.columns; i++) {
                for (let j = 0; j < PARAMS.rows; j++) {

                    let x = i * cellW + cellW / 2;
                    let y = j * cellH + cellH / 2;

                    let offset = i * PARAMS.waveFrequency + j * PARAMS.waveFrequency;
                    let wave = sin(frameCount * PARAMS.speed + offset);

                    let dynamicAngle = 0;
                    let dynamicScale = PARAMS.baseScale;
                    let moveX = 0;
                    let moveY = 0;

                    // 【核心邏輯】分配新的動態引擎
                    if (PARAMS.dynamicMode === 'wave') {
                        dynamicAngle = wave * PARAMS.rotationAmp;
                        dynamicScale = PARAMS.baseScale + wave * 0.5;
                    }
                    else if (PARAMS.dynamicMode === 'orbit') {
                        moveX = cos(frameCount * PARAMS.speed + offset) * (cellW * 0.5);
                        moveY = sin(frameCount * PARAMS.speed + offset) * (cellH * 0.5);
                    }
                    else if (PARAMS.dynamicMode === 'slide') {
                        // 利用取餘數 (%2) 判斷奇偶數列，讓它們往反方向滑動
                        let direction = (j % 2 === 0) ? 1 : -1;
                        moveX = wave * (cellW * 1.5) * direction;
                    }
                    else if (PARAMS.dynamicMode === 'jitter') {
                        // 利用 random() 產生高頻率的不規則震動
                        moveX = random(-5, 5) * (PARAMS.speed * 100);
                        moveY = random(-5, 5) * (PARAMS.speed * 100);
                        // 抖動模式下保留輕微的隨機旋轉
                        dynamicAngle = random(-5, 5) * (PARAMS.speed * 100);
                    }

                    push();
                    translate(x + moveX, y + moveY);
                    rotate(radians(dynamicAngle));
                    scale(dynamicScale);

                    if (PARAMS.shape === 'rect') {
                        rect(0, 0, cellW * 0.6, cellH * 0.6);
                    } else if (PARAMS.shape === 'circle') {
                        circle(0, 0, cellW * 0.6);
                    } else if (PARAMS.shape === 'line') {
                        stroke(PARAMS.color);
                        strokeWeight(3);
                        line(-cellW * 0.4, 0, cellW * 0.4, 0);
                    } else if (PARAMS.shape === 'text') {
                        textSize(cellW * 0.8);
                        text(PARAMS.textContent, 0, 0);
                    } else if (PARAMS.shape === 'image') {
                        if (customImage) {
                            image(customImage, 0, 0, cellW * 0.8, cellH * 0.8);
                        } else {
                            stroke(255, 50);
                            strokeWeight(1);
                            line(-10, -10, 10, 10);
                            line(-10, 10, 10, -10);
                        }
                    }

                    pop();
                }
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
